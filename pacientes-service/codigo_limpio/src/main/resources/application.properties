# Nombre de la aplicacion
spring.application.name=v_1

# Coordenadas de la Base de Datos (Laragon)
spring.datasource.url=jdbc:mysql://localhost:3307/saludplus_db
spring.datasource.username=root
spring.datasource.password=

# Instrucciones para que Spring cree la tabla automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Seguridad de tu API
spring.security.user.name=admin
spring.security.user.password=seguridad2026
# Optimización para Carga Masiva (Lotes de 50)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.generate_statistics=true
# Desactivar logs individuales para mejorar velocidad
spring.jpa.show-sql=false