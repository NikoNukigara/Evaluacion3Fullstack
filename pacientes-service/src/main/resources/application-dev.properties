# Configuración Base de Datos para Desarrollo (Dev)
spring.datasource.url=jdbc:mysql://localhost:3308/saludplus_db_dev?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Seguridad
spring.security.user.name=admin
spring.security.user.password=seguridad2026

# Optimización para Carga Masiva (Lotes de 50)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.generate_statistics=true

# Swagger Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Servidor y Eureka
server.port=8081
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

