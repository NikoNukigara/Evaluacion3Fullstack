# Nombre del microservicio y puerto donde vivirá (8083)
spring.application.name=cita-service
server.port=8083

# Conexión a la base de datos exclusiva de citas (usando el puerto 3308)
spring.datasource.url=jdbc:mysql://localhost:3308/cita_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Configuración del motor de base de datos
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Swagger Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/